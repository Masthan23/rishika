<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#a21caf">
    <title>AttendPro × Dashverse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #e879f9; --p2: #7c3aed; --ac: #22d3ee;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            width:100%; height:100%; overflow:hidden;
            font-family:'Outfit','Segoe UI',system-ui,sans-serif;
            -webkit-font-smoothing:antialiased;
        }
        body {
            background:
                radial-gradient(ellipse 100% 70% at 50% -20%,rgba(192,38,211,.25) 0%,transparent 55%),
                radial-gradient(ellipse 80% 60% at 100% 50%,rgba(34,211,238,.08) 0%,transparent 50%),
                linear-gradient(165deg,#030014 0%,#12081f 55%,#030014 100%);
            display:flex; align-items:center; justify-content:center;
            flex-direction:column; gap:26px;
        }
        body::before {
            content:''; position:fixed; inset:0; pointer-events:none;
            background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(232,121,249,.03) 2px,rgba(232,121,249,.03) 3px);
            mix-blend-mode:overlay; z-index:0;
        }
        .go-home-btn {
            position:fixed; top:16px; left:16px; z-index:2;
            width:42px; height:42px; border:none; border-radius:12px;
            background:linear-gradient(135deg,var(--p),var(--p2));
            color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
            font-size:1.15rem; box-shadow:0 12px 28px rgba(124,58,237,.35);
            transition:transform .25s ease, box-shadow .25s ease;
        }
        .go-home-btn:hover {
            transform:translateY(-2px) scale(1.05);
            box-shadow:0 16px 36px rgba(124,58,237,.45);
        }
        .go-home-btn:active { transform:scale(.95); }
        .ap-loader {
            width:min(240px,52vw); height:min(240px,52vw);
            max-width:260px; max-height:260px;
            position:relative; perspective:1200px; perspective-origin:50% 42%;
            z-index:1;
        }
        .ap-loader__spin {
            position:absolute; inset:0; transform-style:preserve-3d;
            animation:ap-orbit 14s linear infinite; will-change:transform;
        }
        @keyframes ap-orbit {
            from { transform:rotateX(58deg) rotateZ(0deg); }
            to   { transform:rotateX(58deg) rotateZ(360deg); }
        }
        .ap-loader__ring {
            position:absolute; inset:0; border-radius:50%;
            border:2.5px solid transparent;
            border-top-color:rgba(232,121,249,.88);
            border-right-color:rgba(124,58,237,.4);
            box-shadow:0 0 32px rgba(232,121,249,.3),inset 0 0 26px rgba(34,211,238,.08);
            transform-style:preserve-3d;
        }
        .ap-loader__ring:nth-child(2) {
            inset:11%; transform:rotateY(56deg);
            border-top-color:rgba(124,58,237,.75);
            border-right-color:rgba(34,211,238,.42);
        }
        .ap-loader__ring:nth-child(3) {
            inset:23%; transform:rotateX(52deg);
            border-top-color:rgba(34,211,238,.55);
            border-right-color:rgba(251,191,36,.25);
        }
        .dv-gem-wrap {
            position:absolute; left:50%; top:50%; width:46%; height:46%;
            margin:-23% 0 0 -23%; transform-style:preserve-3d;
            animation:dvGemBob 3.2s ease-in-out infinite alternate;
        }
        @keyframes dvGemBob {
            from { transform:translateZ(26px) rotateY(-8deg) scale(1); }
            to   { transform:translateZ(48px) rotateY(10deg) scale(1.05); }
        }
        .dv-gem-bloom {
            position:absolute; inset:-30%; border-radius:40%;
            background:radial-gradient(circle,rgba(232,121,249,.35) 0%,transparent 70%);
            filter:blur(20px); z-index:-1;
            animation:dvBloom 2.8s ease-in-out infinite alternate;
        }
        @keyframes dvBloom {
            from { opacity:.55; transform:scale(.92); }
            to   { opacity:1;   transform:scale(1.08); }
        }
        .dv-gem-img {
            width:100%; height:100%; border-radius:32%; object-fit:cover;
            border:2px solid rgba(255,255,255,.22);
            box-shadow:0 0 0 1px rgba(232,121,249,.35),0 22px 50px rgba(0,0,0,.45),0 0 60px rgba(232,121,249,.35);
            filter:saturate(1.15) contrast(1.05);
        }
        .brand { position:relative; z-index:1; text-align:center; }
        .brand-name {
            font-size:clamp(1.85rem,5.5vw,2.5rem); font-weight:900;
            letter-spacing:-.045em; color:#faf5ff;
            text-shadow:0 6px 40px rgba(232,121,249,.45);
        }
        .brand-name span {
            background:linear-gradient(135deg,#f0abfc,#22d3ee,#fde68a);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .brand-tag {
            font-size:.74rem; font-weight:600; letter-spacing:.32em;
            text-transform:uppercase; color:rgba(250,245,255,.42);
            margin-top:6px;
        }
        .progress-wrap {
            width:min(220px,55vw); height:4px;
            background:rgba(232,121,249,.12); border-radius:99px; overflow:hidden;
            z-index:1; box-shadow:inset 0 1px 2px rgba(0,0,0,.15);
        }
        .progress-bar {
            height:100%; width:0%; border-radius:99px;
            background:linear-gradient(90deg,var(--p),var(--ac),var(--p2));
            box-shadow:0 0 14px rgba(232,121,249,.4);
            transition:width .3s ease;
        }
        .redirect-msg {
            font-size:.78rem; color:rgba(250,245,255,.4);
            letter-spacing:.05em; z-index:1; text-align:center;
        }
    </style>
</head>
<body>
    <button class="go-home-btn" type="button" onclick="window.location.replace('app.html')" title="Go to Home" aria-label="Go to Home">🏠</button>
    <div class="ap-loader" aria-hidden="true">
        <div class="ap-loader__spin">
            <div class="ap-loader__ring"></div>
            <div class="ap-loader__ring"></div>
            <div class="ap-loader__ring"></div>
            <div class="dv-gem-wrap">
                <div class="dv-gem-bloom"></div>
                <img src="1.jpg" alt="" class="dv-gem-img" width="160" height="160" decoding="async"/>
            </div>
        </div>
    </div>
    <div class="brand">
        <div class="brand-name">Attend<span>Pro</span></div>
        <div class="brand-tag">Dashverse · Animation &amp; AI</div>
    </div>
    <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="redirect-msg" id="redirectMsg">Loading...</div>

    <script>
        // Set flag so app.html knows we came from index
        sessionStorage.setItem('fromIndexPage', '1');

        var bar = document.getElementById('progressBar');
        var msg = document.getElementById('redirectMsg');
        var start = Date.now();
        var duration = 1800; // ms before redirect

        var messages = ['Initializing...', 'Loading workspace...', 'Almost ready...', 'Welcome!'];
        var msgIdx = 0;

        var interval = setInterval(function() {
            var elapsed = Date.now() - start;
            var pct = Math.min(100, (elapsed / duration) * 100);
            bar.style.width = pct + '%';

            var newIdx = Math.floor((pct / 100) * messages.length);
            if (newIdx !== msgIdx && newIdx < messages.length) {
                msgIdx = newIdx;
                msg.textContent = messages[msgIdx];
            }

            if (elapsed >= duration) {
                clearInterval(interval);
                bar.style.width = '100%';
                msg.textContent = 'Redirecting...';
                setTimeout(function() {
                    window.location.replace('app.html');
                }, 150);
            }
        }, 30);
    </script>
</body>
</html>
